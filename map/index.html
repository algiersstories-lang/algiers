<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    /* Layout: Sidebar and Map side-by-side */
    .map-wrapper-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
        width: 100%;
        margin-top: 20px;
    }

    /* Sidebar Styling */
    #sidebar {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        border: 1px solid #eee;
        height: fit-content;
    }

    #sidebar h4 {
        margin: 0 0 15px 0;
        color: var(--hist-teal);
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        cursor: pointer;
        font-size: 0.95rem;
        font-family: 'Georgia', serif;
    }

    /* Map Container */
    #map {
        height: calc(100vh - 150px);
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        border: 1px solid #ddd;
    }

    /* Floating Locate Me Button */
    .locate-me-btn {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        background-color: white;
        border: 2px solid rgba(0,0,0,0.2);
        border-radius: 4px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    /* Label & Popup Styles */
    .citadelle-static-label {
        font-family: 'Georgia', serif;
        font-size: 13px;
        font-weight: bold;
        color: var(--terracotta, #A0522D);
        white-space: nowrap;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        transform: translate(-50%, -50%);
        text-align: center;
        text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff;
    }

    .label {
        font-size: 11px;
        font-weight: bold;
        color: var(--hist-teal);
        background: rgba(255,255,255,0.85);
        padding: 2px 5px;
        border-radius: 4px;
        border: 1px solid rgba(0,0,0,0.1);
        white-space: nowrap;
        pointer-events: none;
    }

    .popup-btn {
        display: block;
        text-align: center;
        background: var(--med-blue);
        color: white !important;
        padding: 8px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        margin-top: 10px;
        font-size: 0.9rem;
    }
</style>

<div class="map-wrapper-layout">

</div>

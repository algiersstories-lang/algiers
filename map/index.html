---
layout: base.njk
title: "Interactive Map"
---

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    /* Container for layout alignment */
    .map-wrapper-layout {
        position: relative; /* Essential to let the locate button float over the map */
        width: 100%;
    }

    /* Map Container - Adjusts for the top menu height */
    #map {
        height: calc(100vh - 150px); 
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        border: 1px solid #ddd;
    }

    /* Floating Locate Me Button Styling */
    .locate-me-btn {
        position: absolute;
        top: 80px; /* Perfectly sits right below Leaflet's zoom (+ / -) controls */
        left: 10px;
        z-index: 1000;
        background-color: white;
        border: 2px solid rgba(0,0,0,0.2);
        border-radius: 4px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        transition: background-color 0.2s;
    }

    .locate-me-btn:hover {
        background-color: #f4f4f4;
    }

    .locate-me-btn svg {
        width: 20px;
        height: 20px;
        fill: var(--charcoal, #333);
    }

    /* Legend Styling */
    .legend {
        background: rgba(255, 255, 255, 0.95);
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        font-family: 'Georgia', serif;
        line-height: 1.5;
        max-height: 300px;
        overflow-y: auto;
    }

    .legend h4 {
        margin: 0 0 10px 0;
        color: var(--hist-teal);
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
    }

    /* Marker Labels */
    .label {
        font-size: 11px;
        font-weight: bold;
        color: var(--hist-teal);
        background: rgba(255,255,255,0.85);
        padding: 2px 5px;
        border-radius: 4px;
        border: 1px solid rgba(0,0,0,0.1);
        white-space: nowrap;
        pointer-events: none; /* Allows clicking markers through the labels */
    }

    /* Popup Styling */
    .leaflet-popup-content-wrapper {
        border-radius: 8px;
        padding: 5px;
    }
    
    .popup-btn {
        display: block;
        text-align: center;
        background: var(--med-blue);
        color: white !important;
        padding: 8px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        margin-top: 10px;
        font-size: 0.9rem;
    }
</style>

<div class="map-wrapper-layout">
    <div class="locate-me-btn" id="locateBtn" title="Me localiser sur la carte">
        <svg viewBox="0 0 24 24">
            <path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4Z" />
        </svg>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // --- 1. INITIALIZE MAP ---
    var map = L.map('map').setView([36.78497, 3.06081], 16);

    // Ensure map renders correctly inside the layout container
    setTimeout(() => { map.invalidateSize(); }, 400);

    // Your original base map choice preserved
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap & CartoDB'
    }).addTo(map);

    // --- 2. LAYERS & SETTINGS ---
    var layers = {}; // Holds category groups: layers['mosquee']
    var labelLayer = L.layerGroup().addTo(map);
    var allLabels = [];
    let userLocationMarker = null; // Track geolocation point safely

    const iconSettings = { iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -32] };
    const defaultIconUrl = 'https://raw.githubusercontent.com/algiersstories-lang/images/main/mosque2.png';

    // Map your spreadsheet categories to your GitHub icons
    const iconMap = {
        "mosquee": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/mosque2.png',
        "gate": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/porte2.png',
        "porte": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/porte2.png',
        "palais": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/palace.png',
        "musee": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/museum-icon.png'
    };

    // Custom blue point to contrast nicely with historical architecture icons
    const userLocationIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    // Helper: Create URL slugs to match Eleventy's monument pages
    const slugify = t => t.toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().replace(/\s+/g, '-').replace(/[^\w-]+/g, '').replace(/--+/g, '-');

    // Casbah Heritage Perimeter
    var casbahPolygon = [[36.7895, 3.0627], [36.7894, 3.0612], [36.7883, 3.0591], [36.7856, 3.0560], [36.78367165477799, 3.054830206407175],[36.78420512190193, 3.0544038846462565], [36.7823, 3.0564], [36.7812, 3.0593], [36.7806, 3.0621], [36.7841, 3.0635], [36.7850, 3.0649], [36.7864, 3.0659], [36.7864, 3.0668], [36.7866, 3.0678], [36.7865, 3.0685], [36.7856, 3.0684], [36.7859, 3.0692], [36.7873, 3.0694], [36.7881, 3.0693], [36.7883, 3.0687], [36.7878, 3.0686], [36.7874, 3.0684], [36.7872, 3.0664], [36.7878, 3.0651], [36.7895, 3.0627]];
    L.polygon(casbahPolygon, { color: '#A0522D', weight: 2, fillColor: '#F5F5DC', fillOpacity: 0.2, interactive: false }).addTo(map);

     var citadelPolygon = [
	[36.78420512190193, 3.0544038846462565],
	[36.78483856489306, 3.055086313947346],
	[36.784412548326806, 3.0555607586509734],
	[36.78384598822311, 3.0560157729250133],
	[36.78336973870913, 3.0559486054492573],
	[36.78367165477799, 3.054830206407175],
	[36.78420512190193, 3.0544038846462565]
      ];
    L.polygon(citadelPolygon, { color: '#4CB6C9', weight: 2, fillColor: '#4CB6C9', fillOpacity: 0.3, interactive: false }).addTo(map);
	


    
    // --- 3. LOAD DATA FROM GOOGLE SHEET ---
    fetch("https://opensheet.elk.sh/1VXIKnUOE_k9W195-BjsM1fX-HvC5B7GD7Zd0blubEwY/markers")
        .then(res => res.json())
        .then(data => {
            let uniqueCategories = new Set();

            data.forEach(place => {
                let lat = parseFloat(place.lat), lon = parseFloat(place.lon);
                if(isNaN(lat) || isNaN(lon)) return;

                let categoryLabel = place.category || "General";
                let catId = categoryLabel.toLowerCase().trim();
                uniqueCategories.add(categoryLabel);

                // Initialize layer group for category if new
                if (!layers[catId]) {
                    layers[catId] = L.layerGroup().addTo(map);
                }

                // Pick Icon
                let iconUrl = iconMap[catId] || defaultIconUrl;
                let customIcon = L.icon({ ...iconSettings, iconUrl: iconUrl });

                // Create Marker
                let monumentUrl = `/algiers/monuments/${slugify(place.name)}/`;
                let marker = L.marker([lat, lon], { icon: customIcon }).addTo(layers[catId]);
                
                marker.bindPopup(`
                    <div style="min-width:180px">
                        <h3 style="margin:0 0 5px 0; color:var(--hist-teal); font-size:1.1rem;">${place.name}</h3>
                        ${place.photo ? `<img src="${place.photo}" style="width:100%; height:100px; object-fit:cover; border-radius:4px;">` : ''}
                        <p style="font-size:0.85rem; margin:8px 0;">${place.description || ""}</p>
                        <a href="${monumentUrl}" class="popup-btn">View Full Details →</a>
                    </div>
                `);

                // Create Hidden Label
                let label = L.marker([lat, lon], {
                    icon: L.divIcon({ className: 'label', html: place.name, iconAnchor: [-10, 10] })
                });
                allLabels.push({ label: label, catId: catId });
            });

            createDynamicLegend(uniqueCategories);
        });

    // --- 4. DYNAMIC LEGEND GENERATOR ---
    function createDynamicLegend(categories) {
        var legend = L.control({ position: 'bottomright' });

        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `<h4>Map Filters</h4>`;

            categories.forEach(cat => {
                let id = cat.toLowerCase().trim();
                let iconUrl = iconMap[id] || defaultIconUrl;
                
                div.innerHTML += `
                    <label style="display:flex; align-items:center; margin-bottom:8px; cursor:pointer; font-size:0.9rem;">
                        <input type="checkbox" class="map-filter" data-cat="${id}" checked style="margin-right:10px">
                        <img src="${iconUrl}" width="18" style="margin-right:8px"> ${cat}
                    </label>`;
            });

            L.DomEvent.disableClickPropagation(div);
            return div;
        };

        legend.addTo(map);
    }

    // --- 5. EVENT LISTENERS (Filter & Zoom) ---
    document.addEventListener('change', function(e) {
        if (e.target.classList.contains('map-filter')) {
            let cat = e.target.getAttribute('data-cat');
            if (e.target.checked) {
                map.addLayer(layers[cat]);
            } else {
                map.removeLayer(layers[cat]);
            }
            updateLabels(); 
        }
    });

    function updateLabels() {
        labelLayer.clearLayers();
        if (map.getZoom() >= 17) {
            allLabels.forEach(item => {
                if (map.hasLayer(layers[item.catId])) {
                    item.label.addTo(labelLayer);
                }
            });
        }
    }

    map.on("zoomend", updateLabels);

    // --- 6. GEOLOCATION SYSTEM ---
    document.getElementById('locateBtn').addEventListener('click', function() {
        if (!navigator.geolocation) {
            alert("Your browser does not support geolocation features.");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(position) {
                var uLat = position.coords.latitude;
                var uLon = position.coords.longitude;

                if (userLocationMarker) {
                    userLocationMarker.setLatLng([uLat, uLon]);
                } else {
                    userLocationMarker = L.marker([uLat, uLon], { icon: userLocationIcon }).addTo(map)
                        .bindPopup("<b>You are here</b>");
                }
                
                userLocationMarker.openPopup();
                map.flyTo([uLat, uLon], 17); // Smooth animated glide to current position
            },
            function(error) {
                alert("Unable to access location. Ensure tracking is permitted in your browser settings.");
            },
            { enableHighAccuracy: true, timeout: 6000 }
        );
    });
</script>

---
layout: base.njk
title: "Interactive Map"
---

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    /* Ensure the wrapper is a positioning context */
    .map-wrapper-layout { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-top: 20px; }
    
    #filter-container { display: flex; flex-wrap: wrap; gap: 15px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; align-items: center; }
    
    .legend-item { display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; font-family: 'Georgia', serif; background: #f9f9f9; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd; }
    
    /* Map container positioning */
    .map-container-relative { position: relative; width: 100%; height: calc(100vh - 200px); }
    
    #map { height: 100%; width: 100%; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid #ddd; z-index: 1; }
    
    /* Forced high z-index and pointer-events for the button */
    .locate-me-btn { 
        position: absolute; 
        top: 10px; 
        left: 10px; 
        z-index: 10000; 
        background: white; 
        border: 2px solid rgba(0,0,0,0.2); 
        border-radius: 4px; 
        width: 34px; 
        height: 34px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        pointer-events: auto;
    }
    
    .citadelle-static-label { font-family: 'Georgia', serif; font-size: 13px; font-weight: bold; color: #A0522D; transform: translate(-50%, -50%); text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff; }
    .label { font-size: 11px; font-weight: bold; color: var(--hist-teal); background: rgba(255,255,255,0.85); padding: 2px 5px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); white-space: nowrap; pointer-events: none; }
    .popup-btn { display: block; text-align: center; background: #4CB6C9; color: white !important; padding: 8px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
</style>

<div class="map-wrapper-layout">
    <div id="filter-container"><strong>Categories:</strong></div>
    
    <div class="map-container-relative">
        <div class="locate-me-btn" id="locateBtn" title="Me localiser">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4Z" /></svg>
        </div>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([36.78497, 3.06081], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r.png}', { attribution: '&copy; OpenStreetMap' }).addTo(map);

    // Initializations
    var layers = {}, labelLayer = L.layerGroup().addTo(map), allLabels = [];
    const iconMap = { "mosquee": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/mosque2.png', "gate": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/porte2.png', "porte": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/porte2.png', "palais": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/palace.png', "musee": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/museum-icon.png', "mosole": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/icon-mosole.png', "fort": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/icon-fort.png' };

    fetch("https://opensheet.elk.sh/1mbCRLp8PVtJ5J2gKGBn3QQzzLbqnoVmRJ7yLnEw0ZrQ/markers")	
        .then(res => res.json())
        .then(data => {
            let uniqueCats = new Set();
            data.forEach(place => {
                let catId = (place.category || "General").toLowerCase().trim();
                uniqueCats.add(place.category || "General");
                if (!layers[catId]) layers[catId] = L.layerGroup().addTo(map);
                
                let icon = L.icon({ iconUrl: iconMap[catId] || 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [34, 34], iconAnchor: [17, 34] });
                
                L.marker([parseFloat(place.lat), parseFloat(place.lon)], { icon: icon }).addTo(layers[catId])
                    .bindPopup(`<div style="min-width:180px"><h3>${place.name}</h3>${place.photo ? `<img src="${place.photo}" style="width:100%; height:120px; object-fit:cover;">` : ''}<p>${place.description || ""}</p><a href="/algiers/monuments/${place.name.toLowerCase().replace(/\s+/g, '-')}/" class="popup-btn">View Details →</a></div>`);
                
                let label = L.marker([parseFloat(place.lat), parseFloat(place.lon)], { icon: L.divIcon({ className: 'label', html: place.name, iconAnchor: [-10, 10] }) });
                allLabels.push({ label: label, catId: catId });
            });
            
            // Create legend
            const container = document.getElementById('filter-container');
            Array.from(uniqueCats).forEach(cat => {
                let id = cat.toLowerCase().trim();
                let label = document.createElement('label');
                label.className = 'legend-item';
                label.innerHTML = `<input type="checkbox" class="map-filter" data-cat="${id}" checked style="margin-right:8px"> ${cat}`;
                container.appendChild(label);
            });
            updateLabels();
        });

    function updateLabels() {
        labelLayer.clearLayers();
        if (map.getZoom() >= 17) {
            allLabels.forEach(item => { if (map.hasLayer(layers[item.catId])) item.label.addTo(labelLayer); });
        }
    }

    map.on("zoomend", updateLabels);
    document.addEventListener('change', e => {
        if (e.target.classList.contains('map-filter')) {
            let cat = e.target.getAttribute('data-cat');
            e.target.checked ? map.addLayer(layers[cat]) : map.removeLayer(layers[cat]);
            updateLabels();
        }
    });

    // Locate Button Listener
    document.getElementById('locateBtn').addEventListener('click', () => {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                map.flyTo([pos.coords.latitude, pos.coords.longitude], 17);
            });
        }
    });
</script>

---
layout: base.njk
title: "Interactive Map"
---

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    /* Layout: Sidebar and Map side-by-side */
    .map-wrapper-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
        width: 100%;
        margin-top: 20px;
    }

    /* Sidebar Styling */
    #sidebar {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        border: 1px solid #eee;
        height: fit-content;
    }

    #sidebar h4 {
        margin: 0 0 15px 0;
        color: var(--hist-teal);
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        cursor: pointer;
        font-size: 0.95rem;
        font-family: 'Georgia', serif;
    }

    /* Map Container */
    #map {
        height: calc(100vh - 150px);
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        border: 1px solid #ddd;
    }

    /* Floating Locate Me Button */
    .locate-me-btn {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        background-color: white;
        border: 2px solid rgba(0,0,0,0.2);
        border-radius: 4px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    /* Label & Popup Styles */
    .citadelle-static-label {
        font-family: 'Georgia', serif;
        font-size: 13px;
        font-weight: bold;
        color: var(--terracotta, #A0522D);
        white-space: nowrap;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        transform: translate(-50%, -50%);
        text-align: center;
        text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff;
    }

    .label {
        font-size: 11px;
        font-weight: bold;
        color: var(--hist-teal);
        background: rgba(255,255,255,0.85);
        padding: 2px 5px;
        border-radius: 4px;
        border: 1px solid rgba(0,0,0,0.1);
        white-space: nowrap;
        pointer-events: none;
    }

    .popup-btn {
        display: block;
        text-align: center;
        background: var(--med-blue);
        color: white !important;
        padding: 8px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
        margin-top: 10px;
        font-size: 0.9rem;
    }
</style>

<div class="map-wrapper-layout">
    <aside id="sidebar">
        <h4>Monuments Categories</h4>
        <div id="filter-container"></div>
    </aside>

    <div style="position: relative;">
        <div class="locate-me-btn" id="locateBtn" title="Me localiser sur la carte">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4Z" />
            </svg>
        </div>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([36.78497, 3.06081], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap & CartoDB'
    }).addTo(map);

    var layers = {};
    var labelLayer = L.layerGroup().addTo(map);
    var allLabels = [];
    let userLocationMarker = null;

    const iconSettings = { iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -32] };
    const defaultIconUrl = 'https://raw.githubusercontent.com/algiersstories-lang/images/main/mosque2.png';
    const iconMap = {
        "mosquee": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/mosque2.png',
        "gate": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/porte2.png',
        "porte": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/porte2.png',
        "palais": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/palace.png',
        "musee": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/museum-icon.png',
        "mosole": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/icon-mosole.png',
        "fort": 'https://raw.githubusercontent.com/algiersstories-lang/images/main/icon-fort.png'
    };

    const slugify = t => t.toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().replace(/\s+/g, '-').replace(/[^\w-]+/g, '').replace(/--+/g, '-');

    // Load Data
    fetch("https://opensheet.elk.sh/1mbCRLp8PVtJ5J2gKGBn3QQzzLbqnoVmRJ7yLnEw0ZrQ/markers")	
        .then(res => res.json())
        .then(data => {
            let uniqueCategories = new Set();
            data.forEach(place => {
                let lat = parseFloat(place.lat), lon = parseFloat(place.lon);
                if(isNaN(lat) || isNaN(lon)) return;

                let categoryLabel = place.category || "General";
                let catId = categoryLabel.toLowerCase().trim();
                uniqueCategories.add(categoryLabel);

                if (!layers[catId]) layers[catId] = L.layerGroup().addTo(map);

                let iconUrl = iconMap[catId] || defaultIconUrl;
                let customIcon = L.icon({ ...iconSettings, iconUrl: iconUrl });
                let marker = L.marker([lat, lon], { icon: customIcon }).addTo(layers[catId]);
                
                marker.bindPopup(`<div style="min-width:180px"><h3>${place.name}</h3><a href="/algiers/monuments/${slugify(place.name)}/" class="popup-btn">View Details →</a></div>`);
                
                let label = L.marker([lat, lon], { icon: L.divIcon({ className: 'label', html: place.name, iconAnchor: [-10, 10] }) });
                allLabels.push({ label: label, catId: catId });
            });
            createDynamicLegend(uniqueCategories);
        });

    function createDynamicLegend(categories) {
        var container = document.getElementById('filter-container');
        categories.forEach(cat => {
            let id = cat.toLowerCase().trim();
            let iconUrl = iconMap[id] || defaultIconUrl;
            let label = document.createElement('label');
            label.className = 'legend-item';
            label.innerHTML = `<input type="checkbox" class="map-filter" data-cat="${id}" checked style="margin-right:10px"><img src="${iconUrl}" width="20" style="margin-right:10px"> ${cat}`;
            container.appendChild(label);
        });
    }

    document.addEventListener('change', function(e) {
        if (e.target.classList.contains('map-filter')) {
            let cat = e.target.getAttribute('data-cat');
            e.target.checked ? map.addLayer(layers[cat]) : map.removeLayer(layers[cat]);
            updateLabels();
        }
    });

    function updateLabels() {
        labelLayer.clearLayers();
        if (map.getZoom() >= 17) {
            allLabels.forEach(item => { if (map.hasLayer(layers[item.catId])) item.label.addTo(labelLayer); });
        }
    }

    map.on("zoomend", updateLabels);

    document.getElementById('locateBtn').addEventListener('click', function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                let coords = [pos.coords.latitude, pos.coords.longitude];
                if (!userLocationMarker) userLocationMarker = L.marker(coords).addTo(map);
                else userLocationMarker.setLatLng(coords);
                map.flyTo(coords, 17);
            });
        }
    });
</script>

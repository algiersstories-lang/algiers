---
layout: base.njk
title: "Interactive Map"
---

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    /* Layout: Filters at the top, Map below */
    .map-wrapper-layout {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%;
        margin-top: 20px;
    }

    /* Horizontal Filter Bar */
    #filter-container {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        background: #fff;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border: 1px solid #eee;
    }

    .legend-item {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 0.9rem;
        font-family: 'Georgia', serif;
        background: #f9f9f9;
        padding: 5px 10px;
        border-radius: 20px;
        border: 1px solid #ddd;
    }

    #map {
        height: calc(100vh - 200px);
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    /* Floating Locate Me Button */
    .locate-me-btn {
        position: absolute;
        top: 80px; 
        left: 10px;
        z-index: 1000;
        background-color: white;
        border: 2px solid rgba(0,0,0,0.2);
        border-radius: 4px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    /* Label & Popup Styles */
    .citadelle-static-label {
        font-family: 'Georgia', serif;
        font-size: 13px;
        font-weight: bold;
        color: var(--terracotta, #A0522D);
        white-space: nowrap;
        background: transparent !important;
        border: none !important;
        transform: translate(-50%, -50%);
        text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff;
    }

    .label { font-size: 11px; font-weight: bold; color: var(--hist-teal); background: rgba(255,255,255,0.85); padding: 2px 5px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); pointer-events: none; }
    .popup-btn { display: block; text-align: center; background: var(--med-blue); color: white !important; padding: 8px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 10px; }
</style>

<div class="map-wrapper-layout">
    <div id="filter-container">
        <strong>Categories:</strong>
    </div>

    <div style="position: relative;">
        <div class="locate-me-btn" id="locateBtn" title="Me localiser">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4Z" /></svg>
        </div>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([36.78497, 3.06081], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

    // RESTORED: Polygons
    L.polygon([[36.7889331,3.0631234],[36.7890035,3.0615222],/* ... your full coords ... */], { color: '#A0522D', weight: 4, fillColor: '#F5F5DC', fillOpacity: 0.2, interactive: false }).addTo(map);
    L.polygon([[36.7849101,3.0550896],/* ... your full coords ... */], { color: '#4CB6C9', weight: 2, fillColor: '#4CB6C9', fillOpacity: 0.3, interactive: false }).addTo(map);
    
    L.marker([36.78468878202779, 3.054979095979314], { icon: L.divIcon({ className: 'citadelle-static-label', html: "La Citadelle d'Alger" }), interactive: false }).addTo(map);

    var layers = {};
    var labelLayer = L.layerGroup().addTo(map);
    var allLabels = [];
    let userLocationMarker = null;

    const iconSettings = { iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -32] };
    const iconMap = { "mosquee": '...', "gate": '...', "porte": '...', "palais": '...', "musee": '...', "mosole": '...', "fort": '...' }; // Populate with your URLs

    fetch("https://opensheet.elk.sh/1mbCRLp8PVtJ5J2gKGBn3QQzzLbqnoVmRJ7yLnEw0ZrQ/markers")	
        .then(res => res.json())
        .then(data => {
            let uniqueCategories = new Set();
            data.forEach(place => {
                let catId = (place.category || "General").toLowerCase().trim();
                uniqueCategories.add(place.category || "General");
                if (!layers[catId]) layers[catId] = L.layerGroup().addTo(map);

                let marker = L.marker([parseFloat(place.lat), parseFloat(place.lon)], { icon: L.icon({ ...iconSettings, iconUrl: iconMap[catId] || '...' }) }).addTo(layers[catId]);
                
                // RESTORED: Full Popup content
                marker.bindPopup(`
                    <div style="min-width:180px">
                        <h3 style="margin:0 0 5px 0; color:var(--hist-teal);">${place.name}</h3>
                        ${place.photo ? `<img src="${place.photo}" style="width:100%; height:120px; object-fit:cover; border-radius:4px;">` : ''}
                        <p style="font-size:0.85rem; margin:8px 0;">${place.description || ""}</p>
                        <a href="/algiers/monuments/${place.name.toLowerCase().replace(/\s+/g, '-')}/" class="popup-btn">View Full Details →</a>
                    </div>
                `);
                
                allLabels.push({ label: L.marker([place.lat, place.lon], { icon: L.divIcon({ className: 'label', html: place.name, iconAnchor: [-10, 10] }) }), catId: catId });
            });
            createHorizontalLegend(uniqueCategories);
        });

    function createHorizontalLegend(categories) {
        var container = document.getElementById('filter-container');
        categories.forEach(cat => {
            let label = document.createElement('label');
            label.className = 'legend-item';
            label.innerHTML = `<input type="checkbox" class="map-filter" data-cat="${cat.toLowerCase().trim()}" checked style="margin-right:8px"> ${cat}`;
            container.appendChild(label);
        });
    }

    // ... (Filter and Geolocation logic remains the same)
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Djamaa Safir | Algiers Stories</title>
    <style>
        :root {
            --med-blue: #4CB6C9;
            --hist-teal: #006064;
            --terracotta: #A0522D;
            --parchment: #F5F5DC;
        }
        body {
            background-color: var(--parchment);
            color: #333;
            font-family: 'Georgia', serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.7;
        }
        .back-link { color: var(--med-blue); text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; }
        
        h1 { color: var(--hist-teal); font-size: 2.8rem; margin: 10px 0; }
        
        .description { font-style: italic; font-size: 1.2rem; color: #555; margin-bottom: 25px; }

        .history-box {
            background: var(--hist-teal);
            color: white;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
        }

        .main-photo {
            width: 100%;
            height: auto;
            border: 8px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 30px 0;
        }

        .content-section {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            border-top: 4px solid var(--terracotta);
            margin-top: 20px;
        }

        h2 { 
            color: var(--terracotta); 
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-top: 30px;
        }

        .external-link {
            display: inline-block;
            margin-top: 40px;
            padding: 10px 20px;
            background-color: var(--med-blue);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .external-link:hover { background-color: var(--hist-teal); }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .gallery-grid img { width: 100%; border: 4px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
